Page Fixture:
-------------

Built-in object (page) provided by the test runner to interact with a browser page 
(open URL, click, type, etc.)

No need to create browser/page manually, it is automatically handled by the test runner.

syntax:
-------

test('title', async ({ page }) => {
  await page.goto('https://www.google.com/'); // using page fixture
});


Internally(page fixture implementation):
---------------------------------------
test('title', async () => {
const browser = await chromium.launch();
const context = await browser.newContext();
const page = await context.newPage();
await page.goto('https://www.google.com/')
})


Playwright Config File:
-----------------------

A configuration file (playwright.config.ts) that defines settings for running tests
such as test directory, timeout, browser options, etc.

It allows you to customize the test environment and behavior.


