DOM Basics:

DOM (Document Object Model) is a programming interface for HTML and XML documents. 
It represents the page as a tree of objects, allowing scripts to manipulate the content, 
structure, and style of a webpage.

structure of DOM:
----------------- 

Ways to Open DOM:
-----------------

1. right click on the application and click on inspect
2. press f12 or fn + f12
3. press ctrl + shift + i => browser click on 3 idot -> more tools -> developer tools


- Document: The root of the DOM tree, representing the entire webpage.

- The entire page is didvided into two main sections:
  - Head: Contains metadata, links to stylesheets, scripts, etc.
  - Body: Contains the visible content of the webpage (text, images, links, etc.)
- Element: Represents an HTML element (e.g., <div>, <p>, <a>, etc.) and can have 
 attributes and child elements.


Playwright Selectors:
--------------------

Selectors are used to locate and interact with elements on a webpage. Playwright supports
various types of selectors, including:

CSS Locators
Xpath
Playwright built in locators

1. CSS Selectors: Use CSS syntax to select elements based on their classes, IDs, attributes, etc.
   Example: page.locator('input[name="username"]')


Basic Loactor:
1.id
2.class
3.name


<input class="inputLogin" type="text" id="username" name="USERNAME" size="50">
<label for="username">Username</label>

tag name-> input, label

class,type,id,name,size -> attributeName

"inputLogin","text","username","USERNAME" -> attributeValue

black color text-Username -> text

id-unique value
name - name of the attribute
class -used for styling/grouping elements


CSS : Cascading Style sheets

id attribute
-------------

1. #attributeValue -> #username
2. [id='username']
3. tagname[attributeName='attributeValue'] -> input[id='username']

name attribute:
---------------

1. [name='USERNAME']
2. tagname[attributeName='attributeValue'] -> input[name='USERNAME']

class attribute:
----------------

1. .attributeValue -> .decorativeSubmit
2. [class='decorativeSubmit']
3. tagname[attributeName='attributeValue'] -> input[class='decorativeSubmit']

.input r4 wide mb16 mt8 username -> it wll not work
